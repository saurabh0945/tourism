<!DOCTYPE html>
<html>

<head>

    <title>Tour Booking</title>

    <link rel="stylesheet" href="css/booking.css">

</head>

<body>

<div class="container">

    <h1>Tour Booking</h1>

    <form method="POST" action="booking.php">

        <div class="textbox">
            <input type="text" name="ffirst" placeholder="First Name" required>
        </div>

        <div class="textbox">
            <input type="text" name="flast" placeholder="Last Name" required>
        </div>

        <div class="textbox">
            <input type="email" name="femail" placeholder="Email" required>
        </div>

        <div class="textbox">
            <input type="text" name="city" placeholder="City" required>
        </div>

        <div class="textbox">
            <input type="text" name="fphone" placeholder="Phone Number" required>
        </div>

        <div class="btn">
            <input type="submit" name="submit" value="Book Tour">
        </div>

    </form>

</div>

</body>
</html>
